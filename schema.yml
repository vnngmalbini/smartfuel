components:
  schemas:
    ActionEnum:
      enum:
      - login
      - logout
      - price_change
      - inventory_update
      - transaction
      - user_created
      - user_deleted
      type: string
      description: |-
        * `login` - Login
        * `logout` - Logout
        * `price_change` - Price Change
        * `inventory_update` - Inventory Update
        * `transaction` - Transaction
        * `user_created` - User Created
        * `user_deleted` - User Deleted
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          nullable: true
        username:
          type: string
          readOnly: true
        action:
          $ref: '#/components/schemas/ActionEnum'
        description:
          type: string
        ip_address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - created_at
      - description
      - id
      - username
    CardToken:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        phone:
          type: string
          maxLength: 20
        card_token:
          type: string
          readOnly: true
        card_last4:
          type: string
          maxLength: 4
        card_type:
          type: string
          maxLength: 50
        is_primary:
          type: boolean
        expires_at:
          type: string
          format: date
      required:
      - card_last4
      - card_token
      - card_type
      - expires_at
      - id
      - phone
    Customer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        phone:
          type: string
          maxLength: 20
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        total_purchases:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          readOnly: true
        total_liters:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        loyalty_points:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        is_registered:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - first_name
      - id
      - last_name
      - phone
      - total_liters
      - total_purchases
      - updated_at
    DailySalesReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
        total_transactions:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        total_liters_sold:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total_revenue:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
        total_expenses:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
        profit:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          readOnly: true
        petrol_sold:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        diesel_sold:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        lpg_sold:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - date
      - id
      - profit
    FuelInventory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        fuel_type:
          type: integer
        fuel_type_name:
          type: string
          readOnly: true
        quantity_liters:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        min_threshold:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        max_capacity:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        cost_per_liter:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_low_stock:
          type: string
          readOnly: true
        last_restocked:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - fuel_type
      - fuel_type_name
      - id
      - is_low_stock
      - last_restocked
    FuelType:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          $ref: '#/components/schemas/FuelTypeNameEnum'
        description:
          type: string
        current_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        price_updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - name
      - price_updated_at
    FuelTypeNameEnum:
      enum:
      - petrol
      - diesel
      - lpg
      type: string
      description: |-
        * `petrol` - Petrol (Premium 95)
        * `diesel` - Diesel
        * `lpg` - LPG (Liquefied Petroleum Gas)
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        title:
          type: string
          maxLength: 200
        message:
          type: string
        related_fuel:
          type: integer
          nullable: true
        fuel_name:
          type: string
          readOnly: true
        related_pump:
          type: integer
          nullable: true
        pump_number:
          type: string
          readOnly: true
        is_read:
          type: boolean
        read_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - fuel_name
      - id
      - message
      - notification_type
      - pump_number
      - read_at
      - title
    NotificationTypeEnum:
      enum:
      - low_stock
      - pump_issue
      - high_transaction
      - payment_failed
      - system
      type: string
      description: |-
        * `low_stock` - Low Stock Alert
        * `pump_issue` - Pump Issue
        * `high_transaction` - High Transaction
        * `payment_failed` - Payment Failed
        * `system` - System Alert
