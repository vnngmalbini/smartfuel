{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div style="margin-top: 80px;">
                <i class="bi bi-lock-fill" style="font-size: 4rem; color: #dc2626;"></i>
                <h1 class="mt-4" style="color: #0f172a; font-weight: 700;">403 - Access Denied</h1>
                <p class="lead" style="color: #475569; font-size: 1.1rem;">
                    You don't have permission to access this area.
                </p>
                <p style="color: #64748b; margin-bottom: 30px;">
                    Please contact your administrator if you believe this is a mistake.
                </p>
                
                {% if messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert" style="margin-bottom: 20px;">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}
                
                <div class="mt-4">
                    <a href="{% url 'root' %}" class="btn btn-primary" style="background-color: #2563eb; border: none; padding: 10px 30px; font-weight: 500;">
                        <i class="bi bi-house"></i> Go to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
