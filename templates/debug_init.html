<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Paystack Initialize Debug</title>
    <style>body{font-family:Arial;margin:20px;} pre{background:#f4f4f4;padding:15px;border-radius:6px;overflow:auto}</style>
</head>
<body>
    <h2>Paystack Initialize Response (from session)</h2>
    {% if init %}
        <pre>{{ init|safe }}</pre>
    {% else %}
        <p>No initialize response stored in session. Recreate a payment first.</p>
    {% endif %}
</body>
</html>
