<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | FuelSync</title>
    <link rel="stylesheet" href="{% static 'css/ui-base.css' %}">
    <link rel="stylesheet" href="{% static 'css/fuelsync-pages.css' %}">
    <link rel="stylesheet" href="{% static 'css/professional-polish.css' %}">
    <style>
        body{
            min-height:100vh;
            display:grid;
            place-items:center;
            padding:24px;
            max-width:600px;
            margin-left:auto;
            margin-right:auto;
        }
        .box{
            width:100%;
            max-width:420px;
            padding:24px;
            border-radius:16px;
            text-align:center;
        }
        h1{margin:0 0 10px;font-size:1.8rem;color:#0D47A1}
        h2{margin:0 0 20px;font-size:1.5rem;color:#1565C0}
        img{width:min(260px,100%);display:block;margin:0 auto 12px;border-radius:10px;border:1px solid #E2E8F0;padding:8px;background:#fff}
        p{margin:0;color:#718096;font-size:0.98rem}
        .hint{margin-top:18px;padding:12px 14px;border-radius:10px;background:#F0F7FF;border-left:4px solid #0D47A1;color:#1A202C;text-align:left}
        @media (max-width:640px){.box{padding:24px}}
    </style>
</head>
<body>

<div class="box">
    <h1>Scan to Pay</h1>
    <h2>GHS {{ amount }}</h2>

    <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">

    <div class="hint">Scan this QR code with your mobile money app to complete payment.</div>
</div>

</body>
</html>
